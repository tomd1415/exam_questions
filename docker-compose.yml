services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: exam_questions_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: exam
      POSTGRES_PASSWORD: exam
      POSTGRES_DB: exam_dev
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C.UTF-8"
    ports:
      # Host 5433 to avoid clashing with a system Postgres on 5432.
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db-init.sh:/docker-entrypoint-initdb.d/01-init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exam -d exam_dev"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
    name: exam_questions_postgres_data
